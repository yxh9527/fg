syntax = "proto3";

option go_package = "./services;services";

package base;

enum error_code {
    OK = 0;
    GAME_FROZEN = 1;//游戏暂停服务
    AGENT_FROZEN = 2;//代理被冻结
    SYSTEM_ERROR = 3;//系统错误
    PARAMS_INVALID = 4;
    USER_LOGIN_ERROR = 5;
    AUTH_PARSING_FAILED = 6;
    AUTH_TOKEN_INVALID = 7;
    NO_ENOUGH_POOL_MONEY = 8;//没有足够水池值
    NO_ENOUGH_MONEY=9;//金币不足
}